<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>魅猫喵娜 ♡ 骰寶策略模擬器 v3.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="simulator-container">
        <!-- 頭部區域 -->
        <div class="header">
            <h1>✧ 魅猫喵娜 · 骰寶黑天鵝實驗室 v3.0 ✧</h1>
            <p>斐波那契｜馬丁格爾｜達蘭貝爾｜保險組合｜1-3-2-6｜反馬丁格爾</p>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="control-group">
                <label>🎲 選擇策略</label>
                <select id="strategySelect">
                    <option value="flat">⚖️ 平注法 (Flat Betting)</option>
                    <option value="martingale">📈 馬丁格爾 (Martingale)</option>
                    <option value="anti_martingale">🔄 反馬丁格爾 (Anti-Martingale)</option>
                    <option value="fibonacci">🌀 斐波那契 (Fibonacci)</option>
                    <option value="dalambert">📊 達蘭貝爾 (D'Alembert)</option>
                    <option value="1326">✨ 1-3-2-6 正級纜</option>
                    <option value="insurance_fibo">🛡️ 保險+斐波那契 (Insurance+Fibo)</option>
                </select>
            </div>
            <div class="control-group">
                <label>💰 初始資金 (柚子幣)</label>
                <input type="number" id="initialBankroll" value="312641" step="1000">
            </div>
            <div class="control-group">
                <label>🔢 基礎單位 (幣)</label>
                <input type="number" id="baseUnit" value="25" step="5">
            </div>
            <div class="control-group">
                <label>🎯 模擬局數</label>
                <input type="number" id="simRounds" value="1000" step="100">
            </div>
            <div class="control-group">
                <label>⚡ 模擬速度 (ms)</label>
                <input type="range" id="simSpeed" min="0" max="100" value="0" step="10">
                <span id="speedLabel" style="font-size:0.7rem;">即時模式</span>
            </div>
            <div class="control-group">
                <button id="runBtn">🐾 開始模擬 🐾</button>
                <button id="exportBtn" style="background: #3366aa; margin-top:5px;">📥 匯出CSV</button>
            </div>
            <div class="stat-badge">
                ⚡ 黑天鵝模擬器 | 獨立事件 · 真實機率
            </div>
        </div>

        <!-- 主要內容區域 - 三欄圖表 -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="card-title">📈 資金曲線</div>
                <canvas id="equityChart" height="200"></canvas>
            </div>
            <div class="chart-card">
                <div class="card-title">🥧 輸贏比例</div>
                <canvas id="pieChart" height="200"></canvas>
            </div>
            <div class="chart-card">
                <div class="card-title">📊 盈虧分佈</div>
                <canvas id="histogramChart" height="200"></canvas>
            </div>
        </div>

        <!-- 績效儀表板和風險分析 -->
        <div class="dashboard">
            <div class="simulation-panel">
                <div class="card">
                    <div class="card-title">📋 對局明細紀錄 (最新50筆)</div>
                    <div class="log-table-wrapper">
                        <table class="log-table" id="detailTable">
                            <thead>
                                <tr><th>場次</th><th>下注類型</th><th>下注額</th><th>骰子結果</th><th>輸贏</th><th>盈虧</th><th>累積資金</th></tr>
                            </thead>
                            <tbody id="logBody">
                                <tr><td colspan="7">點擊「開始模擬」進行測試喵～♡</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="stats-panel">
                <div class="card">
                    <div class="card-title">🏆 績效儀表板</div>
                    <div class="result-grid" id="statsGrid">
                        <div class="metric"><div class="metric-value">—</div><div class="metric-label">等待模擬</div></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">⚠️ 極端風險分析</div>
                    <div id="riskMetrics" class="result-grid" style="grid-template-columns:1fr;">
                        <div class="metric"><div class="metric-label">尚未模擬</div></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">🧠 策略說明</div>
                    <div id="strategyDesc" style="font-size:0.75rem; line-height:1.5;">
                        選擇策略後會顯示詳細說明～
                    </div>
                </div>
            </div>
        </div>

        <footer>
            🐱 魅猫流 · 獨立事件真理 | 每次下注皆獨立，歷史不影響未來。<br>
            本模擬基於真實骰寶機率(圍骰通殺，大小單雙勝率48.61%) | 保險下注法單局輸率降至~26%
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
